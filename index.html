<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Asurion 排班分析工具 - 自動計算請假、加班統計報表">
    <title>Asurion 排班分析工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="header-title">Asurion 排班分析工具</h1>
        <p class="header-subtitle">自動計算請假、加班統計</p>
    </header>

    <!-- Upload Section -->
    <section class="upload-section">
        <div class="upload-card" data-type="application">
            <div class="drop-zone">
                <div class="drop-icon">📋</div>
                <div class="drop-text">拖拽檔案到此處</div>
                <div class="drop-subtext">或點擊選擇 .xlsx 檔案</div>
            </div>
            <input type="file" class="file-input" accept=".xlsx,.xls" hidden>
            <div class="file-status">
                <span class="file-status-icon">✓</span>
                <span class="file-status-name"></span>
            </div>
            <div class="card-label">
                <span class="card-label-icon">📋</span>
                <span class="card-label-title">班表相關申請表單</span>
                <span class="card-label-subtitle">上傳請假與加班原始數據</span>
            </div>
        </div>

        <div class="upload-card" data-type="schedule">
            <div class="drop-zone">
                <div class="drop-icon">📅</div>
                <div class="drop-text">拖拽檔案到此處</div>
                <div class="drop-subtext">或點擊選擇 .xlsx 檔案</div>
            </div>
            <input type="file" class="file-input" accept=".xlsx,.xls" hidden>
            <div class="file-status">
                <span class="file-status-icon">✓</span>
                <span class="file-status-name"></span>
            </div>
            <div class="card-label">
                <span class="card-label-icon">📅</span>
                <span class="card-label-title">排班表</span>
                <span class="card-label-subtitle">上傳排班班表</span>
            </div>
        </div>
    </section>

    <!-- Detected Info -->
    <div id="detected-info" class="detected-info" style="display: none;">
        <span class="detected-icon">📆</span>
        <span class="detected-text"></span>
    </div>

    <!-- Action Buttons -->
    <div class="btn-container">
        <button id="btn-analyze" disabled>🔍 開始分析</button>
        <button id="btn-download" style="display: none;">📥 下載所有報表</button>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" style="display: none;">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">分析中...</p>
        </div>
    </div>

    <!-- Results Section -->
    <section id="results-section" style="display: none;">
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="leave">📋 請假統計</button>
            <button class="tab-btn" data-tab="overtime">⏰ 加班統計</button>
            <button class="tab-btn" data-tab="total">📊 總請假統計</button>
            <button class="tab-btn" data-tab="pto">🏖 特休日數</button>
            <button class="tab-btn" data-tab="allowance">🌙 津貼統計</button>
            <button class="tab-btn" data-tab="personal">👤 個人統計</button>
        </div>
        <div class="tab-content-area">
            <div id="tab-leave" class="tab-content active"></div>
            <div id="tab-overtime" class="tab-content"></div>
            <div id="tab-total" class="tab-content"></div>
            <div id="tab-pto" class="tab-content"></div>
            <div id="tab-allowance" class="tab-content"></div>
            <div id="tab-personal" class="tab-content">
                <div class="personal-controls">
                    <div class="control-group">
                        <label for="personal-agent-select" class="control-label">選擇客服人員：</label>
                        <select id="personal-agent-select" class="theme-select">
                            <option value="">-- 請選擇人員 --</option>
                        </select>
                    </div>
                    <div class="personal-actions">
                        <button id="btn-export-card" class="action-btn">📥 匯出個人圖片</button>
                        <button id="btn-export-all-zip" class="action-btn-secondary">📦 下載所有人員圖片 (ZIP)</button>
                    </div>
                </div>
                <div id="personal-card-container">
                    <div id="personal-report-card" class="personal-report-card">
                        <div class="empty-card-placeholder">
                            <div class="placeholder-icon">👤</div>
                            <p>請選擇客服人員以檢視個人出勤與津貼統計</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
